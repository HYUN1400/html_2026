<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css" />
</head>
<body>
    <div class="main">
        <div class="header">
                <div class="hd-content img">
                    <a href="profile.html">
                        <img src="https://hibarnsley.com/wp-content/uploads/2017/06/dummy-logo.png" alt="">
                    </a>
                </div>
        </div>

        <form action="">
        <div class="container">
            <div class="contact-title">CONTACT</div>
            <div class="form">
                <div class="e-mail">
                    <div>E-MAIL</div>
                    <input type="text" placeholder="Enter E-mail to receive reply">
                </div>
                <div class="e-mail">
                    <div>NAME</div>
                    <input type="text" placeholder="Enter name">
                </div>
                <div class="message">
                    <div>MESSAGE</div>
                    <textarea placeholder="How can I help you?"></textarea>
                </div>
            </div>
            <button>SEND</button>
        </div>
        </form>
    </div>
</body>
</html>

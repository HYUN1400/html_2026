<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background</title>
    <!-- 
        background : 배경
        -background-color : 배경색
        -background-image : 이미지 채우기
            - 배경색과 배경이미지를 둘 다 추가하면 이미지가 우선 출력
            - 이미지가 화면보다 작을 경우 남는 부분에 배경색
        - background-size : 배경이미지 사이즈 (가로 * 세로)
        - background-repeat : 배경이미지 반복
            - no-repeat : 반복x
            - repeat-x : x축으로 반복
            - repeat-y : y축으로 반복
            - round : 양쪽 반복
        - background-position : 배경이미지 위치
            - center : 가운데
            - x, y : 해당 값으로 이동
        background : color image position size repeat 순으로 입력
    -->
    <style>
        .box {
            width: 300px;
            height: 300px;
            background-color: #e8e8e8;
            background-image: url(../resource/unsplash.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: 250px 250px;
        }

        .box2 {
            width: 100%;
            height: 600px;
            background-color: #f4eaea;
            background-image: url(../resource/nasa.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box2"></div>
</body>
</html>

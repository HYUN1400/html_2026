<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position02</title>
    <style>
        .container {
            box-sizing: border-box;
            width: 100%;
            height: 150px;
            border: 1px solid black;
            position: relative;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: rgb(169, 208, 211);
            position: absolute;
            top: 25px;
        }

        .box:first-child {
            left: 25px;
        }

        .box:nth-child(2) {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .box:last-child {
            right: 25px;
        }

        .container02 {
            margin-top: 10px;
            width: 300px;
            height: 300px;
            background-color: antiquewhite;

            position: relative;
        }

        .box02 {
            box-sizing: border-box;
            width: 100px;
            height: 100px;
            border: 1px solid black;

            position: absolute;

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <div class="container02">
        <div class="box02"></div>
    </div>
</body>
</html>

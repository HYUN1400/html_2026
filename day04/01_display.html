<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display</title>
    <!-- 
        display 속성
        - 태그가 가지고 있는 기본 속성을 변경하는 기능
        - block
            └ 새로운 라인에서 시작 (한 컨텐츠가 한 라인을 차지함)
            └ width, height 등 크기 조절이 가능
            └ margin, padding 등 여백 조절이 가능
        - inline
            └ 현재 라인에서 이어서 시작 (컨텐츠가 자신의 값 만큼만 공간을 가짐)
            └ width, height 등 크기 조절 불가
            └ margin(위아래) 불가능, padding 가능
        - inlineblock
        - flex 
    -->
    <style>
        div, span, b, button {
            box-sizing: border-box;
            display: block;
            width: 200px;
            height: 50px;
            background-color: antiquewhite;
            border: 1px solid black;
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div>block 속성</div>
    <span>inline 속성</span>
    <b>inline 속성</b>
    <button>inlineblock 속성</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            gap: 15px;
        }

        .box {
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            width: 100px;
            height: 100px;
            border: 1px solid black;
            background-color: antiquewhite;
        }

        .box:hover {
            transform: translate(20%, 20%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">T</div>
        <div class="box">H</div>
        <div class="box">A</div>
        <div class="box">N</div>
        <div class="box">K</div>
        <div class="box">S</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        form, lable, radio 버튼을 이용하여
        10대, 20대, 30대, 40대 이상 중 하나를 선택하여 값을 전송
    -->

    <form action="">
        <label for="10">
            <input type="radio" name="age" id="10" value="10"> 10대
        </label>

        <label for="20">
            <input type="radio" name="age" id="20" value="20"> 20대
        </label>

        <label for="30">
            <input type="radio" name="age" id="30" value="30"> 30대
        </label>

        <label for="40">
            <input type="radio" name="age" id="40" value="40"> 40대
        </label>

        <br>
        <button type="submit">제출</button>
    </form>

    <hr>

    <input type="color">
    <input type="date">
    <input type="month">
    <input type="week">
    <input type="datetime">
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 인코딩 방식 설정 : utf-8 한글 깨짐 방지 -->
    <meta charset="UTF-8">
    <!-- 화면 비율 설정 : 내 모티어 화면(브라우저)에 맞게 비율을 처리 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>title</title>
    <style>
        body {
            background-color: #f0f0f0;
        }

        .h1 {
            text-align: center;
            padding: 50px;
            border-radius: 15px;
            color: rgb(0, 0, 0);
            text-shadow: -1px 0px rgb(255, 137, 27), 0px 1px rgb(255, 137, 27), 1px 0px rgb(255, 137, 27), 0px -1px rgb(255, 137, 27);
        }

        img {
            max-width: 200px;
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1 class="h1">Hanwha Eagles</h1> 
    <h2><em>"문현빈"</em></h2>
    <h3>그는누구인가한화이글스의연고지인대전광역시출신이자이글스파크에서불과 10분거리인유천초등학교충청의야구명문온양중그리고한화의성골루트인북일고등학교출신인로컬보이순수혈통그자체로</h3>
    <br />
    <img src="https://i.namu.wiki/i/2gBpZIzziqbFgDf8UjX4vA0uQfA7SK9yTuQ9A8_r9mgUmnMhB7c0EeFxDEHtDNmY5dXIOUwA3MVCQhr0ngk0AA.webp" alt="">
    <!-- html 에서 enter = 줄바꿈 X, 공백 하나 O -->
    <!-- block : tag 하나가 한 줄을 다 차지하는 태그 -->
    <!-- inline : tag 하하나가 본인이 가지고 있는 글자만큼의 영역을 차지하는 태그 -->
    <!-- inlineblock : block과 inline의 속성을 모두 가지고 있는 태그 -->
    <!-- block 태그는 옆에 다른 태그가 올 수 없음. h, div, p ... -->
    <!-- inline 옆에 다른 태그가 올 수 있음. span, strong ... -->

    <br />
    <span>
        SPAN 태그 1
    </span>
    <span>
        SPAN 태그 2
    </span>
    <span>
        SPAN 태그 3
    </span>

    <!-- p 태그 : 문단을 나타내는 태그 block + 위아래 여백 -->

    <p>
        P 태그
    </p>

    <!-- b, strong : 글자를 굵게 만듦 -->

    <b>
        한화 문현빈
    </b>

    <hr />

    <!-- 문자 포맷 -->
    <!-- em : 기울임, del : 취소선, mark : 강조, ins : 밑줄, i : 기울임 -->

</body>
</html>

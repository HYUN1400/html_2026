<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        table : 표를 나타내는 태그 (표 전체 박스)
        tr: 행
        td: 열
        th: 제목열, 가운데 정렬, 굵은 글씨
    -->

    <table border="1">
        <caption>TITLE</caption>
        <thead>
            <tr>
                <th>번호</th>
                <th>이름</th>
                <th>국어</th>
                <th>영어</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>홍길동</td>
                <td>89</td>
                <td>92</td>
            </tr>
            <tr>
                <td>2</td>
                <td>홍길동</td>
                <td>89</td>
                <td>92</td>
            </tr>
            <tr>
                <td>3</td>
                <td>홍길동</td>
                <td>89</td>
                <td>92</td>
            </tr>
            <tr>
                <td>4</td>
                <td>홍길동</td>
                <td>89</td>
                <td>92</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">합계</td>
                <td>000</td>
                <td>000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>

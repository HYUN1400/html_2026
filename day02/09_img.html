<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        img tag
        - input type = "image" 와 같은 기능을 하는 태그
        - src : 그림의 경로
        - alt : 그림이 없을 때 나타나는 글자
        - width : 그림의 가로 길이
        - height : 세로 길이
        - 이미지 사이즈 : px / % 등
    -->
    <!-- 
        이미지 형식
        jpg(jpeg), png 가 대표적

        jpeg : 손실 압축 포맷
        png : 무손실 압축 포맷
    -->

    <img src="../resource/images_miffy.png" alt="miffy">
    <img src="../resource/images_miffy.png" alt="miffy" width="300" height="300">
</body>
</html>

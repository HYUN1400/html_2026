<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            border: 1px solid;
            display: flex;
            justify-content: center;
            padding: 10px;
            gap: 15px;
        }

        div {
            border: 1px solid;
            padding: 10px;
        }
    </style>
</head>
<body>
    <!-- 
        div : 상자를 만들어주는 태그
        영역을 구분하는 역할 => 공간을 할당 => layout 구조를 잡음
        - 컨테이너 역할을 하는 태그
        - 시멘틱 웹(태그) : div 태그에 의미를 부여한 개념
    -->
    <div class="container">
        div
    </div>
    <div class="box">
        box
    </div>
    <header> 헤더 영역 </header>
</body>
</html>
